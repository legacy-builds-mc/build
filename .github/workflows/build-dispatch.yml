name: Build (Dispatched)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Release or Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: 'Target platform'
        required: true
        default: 'Windows64'
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.configuration }})
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Fix ICO format
        shell: pwsh
        run: |
          $icoFiles = Get-ChildItem -Path "Clone" -Recurse -Filter "*.ico"
          Write-Host "Found ICO files:"
          $icoFiles | ForEach-Object { Write-Host $_.FullName }
          foreach ($ico in $icoFiles) {
            $p = $ico.FullName.Replace('\','/')
            Write-Host "Regenerating: $p"
            python -c "import struct; w,h,b=16,16,32; px=bytes(w*h*4); am=bytes(((w+31)//32)*4*h); dib=struct.pack('<IiiHHIIiiII',40,w,h*2,1,b,0,len(px)+len(am),0,0,0,0); img=dib+px+am; hdr=struct.pack('<HHH',0,1,1); de=struct.pack('<BBBBHHII',w,h,0,0,1,b,len(img),22); open(r'$p','wb').write(hdr+de+img); print('Fixed: $p')"
          }

      - name: Build MinecraftConsoles
        run: |
          msbuild Clone/MinecraftConsoles.sln `
            /p:Configuration=${{ inputs.configuration }} `
            /p:Platform=${{ inputs.platform }} `
            /m

      - name: Zip build output
        if: inputs.configuration == 'Release'
        run: 7z a -r LCEWindows64.zip ./Clone/x64/Release/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftClient-${{ inputs.platform }}-${{ inputs.configuration }}
          path: Clone/x64/${{ inputs.configuration }}

      - name: Create GitHub Release
        if: inputs.configuration == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release
          prerelease: true
          files: |
            LCEWindows64.zip
            Clone/x64/Release/Minecraft.Client.exe
            Clone/x64/Release/Minecraft.Client.pdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
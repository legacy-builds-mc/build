name: Build (Dispatched)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Release or Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: 'Target platform'
        required: true
        default: 'Windows64'
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.configuration }})
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Fix ICO format
        shell: pwsh
        run: |
          # Find all .ico files in the Clone folder
          $icoFiles = Get-ChildItem -Path "Clone" -Recurse -Filter "*.ico"
          Write-Host "Found ICO files:"
          $icoFiles | ForEach-Object { Write-Host $_.FullName }

          foreach ($ico in $icoFiles) {
            $path = $ico.FullName
            Write-Host "Regenerating: $path"

            $py = @"
import struct
path = r'$path'
width, height, bpp = 16, 16, 32
pixel_data = bytes(width * height * 4)
and_mask = bytes(((width + 31) // 32) * 4 * height)
dib = struct.pack('<IiiHHIIiiII', 40, width, height*2, 1, bpp, 0, len(pixel_data)+len(and_mask), 0,0,0,0)
image_data = dib + pixel_data + and_mask
ico_header = struct.pack('<HHH', 0, 1, 1)
entry_offset = 6 + 16
dir_entry = struct.pack('<BBBBHHII', width, height, 0, 0, 1, bpp, len(image_data), entry_offset)
with open(path, 'wb') as f:
    f.write(ico_header + dir_entry + image_data)
print('Fixed: ' + path)
"@
            python -c $py
          }

      - name: Build MinecraftConsoles
        run: |
          msbuild Clone/MinecraftConsoles.sln `
            /p:Configuration=${{ inputs.configuration }} `
            /p:Platform=${{ inputs.platform }} `
            /m

      - name: Zip build output
        if: inputs.configuration == 'Release'
        run: 7z a -r LCEWindows64.zip ./Clone/x64/Release/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftClient-${{ inputs.platform }}-${{ inputs.configuration }}
          path: Clone/x64/${{ inputs.configuration }}

      - name: Create GitHub Release
        if: inputs.configuration == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release
          prerelease: true
          files: |
            LCEWindows64.zip
            Clone/x64/Release/Minecraft.Client.exe
            Clone/x64/Release/Minecraft.Client.pdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build (Dispatched)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Release or Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: 'Target platform'
        required: true
        default: 'Windows64'
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.configuration }})
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Fix ICO format
        run: |
          python -c "
import struct, os

path = 'Clone/Minecraft.Client/Xbox/MinecraftWindows.ico'

# Create a minimal valid ICO 3.00 with a 16x16 black icon
width, height = 16, 16
bpp = 32
row_bytes = width * 4
pixel_data = bytes(row_bytes * height)  # BGRA black pixels
and_mask = bytes(((width + 31) // 32) * 4 * height)  # AND mask

dib_header = struct.pack('<IiiHHIIiiII',
    40,          # BITMAPINFOHEADER size
    width,
    height * 2,  # doubled for ICO
    1,           # planes
    bpp,
    0,           # BI_RGB
    len(pixel_data) + len(and_mask),
    0, 0, 0, 0
)

image_data = dib_header + pixel_data + and_mask

# ICO file header
ico_header = struct.pack('<HHH', 0, 1, 1)  # reserved, type=1 (ICO), count=1

# Directory entry: 16x16, 0 colors, 0 reserved, 1 plane, 32 bpp, size, offset
entry_offset = 6 + 16  # header + one directory entry
dir_entry = struct.pack('<BBBBHHII',
    width, height, 0, 0, 1, bpp, len(image_data), entry_offset
)

with open(path, 'wb') as f:
    f.write(ico_header + dir_entry + image_data)

print('ICO regenerated successfully')
          "
        shell: pwsh

      - name: Build MinecraftConsoles
        run: |
          msbuild Clone/MinecraftConsoles.sln `
            /p:Configuration=${{ inputs.configuration }} `
            /p:Platform=${{ inputs.platform }} `
            /m

      - name: Zip build output
        if: inputs.configuration == 'Release'
        run: 7z a -r LCEWindows64.zip ./Clone/x64/Release/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftClient-${{ inputs.platform }}-${{ inputs.configuration }}
          path: Clone/x64/${{ inputs.configuration }}

      - name: Create GitHub Release
        if: inputs.configuration == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release
          prerelease: true
          files: |
            LCEWindows64.zip
            Clone/x64/Release/Minecraft.Client.exe
            Clone/x64/Release/Minecraft.Client.pdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
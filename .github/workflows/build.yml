name: Clone, Build and Release

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: 'Target platform'
        required: true
        default: 'Windows64'
        type: string

jobs:
  # ─── JOB 1: Clone ───────────────────────────────────────────────
  clone:
    name: Clone MinecraftConsoles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete Clone/ and commit
        run: |
          git rm -rf Clone/ --ignore-unmatch
          git diff --cached --quiet || git commit -m "chore: clear Clone/ [skip ci]"
          git push

      - name: Clone MinecraftConsoles into Clone/
        run: |
          git clone https://github.com/smartcmd/MinecraftConsoles.git Clone/
          rm -rf Clone/.git

      - name: Commit and push cloned content
        run: |
          cp MinecraftWindows.ico Clone/Minecraft.Client/Xbox/MinecraftWindows.ico
          cp MinecraftWindows.ico Clone/Minecraft.Client/Xbox/small.ico
          git add Clone/
          git diff --cached --quiet || git commit -m "chore: sync MinecraftConsoles clone [skip ci]"
          git push

  # ─── JOB 2: Build ───────────────────────────────────────────────
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.configuration }})
    runs-on: windows-2022
    needs: clone

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Convert ICO to legacy DIB format
        shell: pwsh
        run: |
          $ico = "Clone/Minecraft.Client/Xbox/MinecraftWindows.ico"
          magick $ico -define icon:auto-resize=256,128,64,48,32,16 -compress none $ico
          Copy-Item $ico "Clone/Minecraft.Client/Xbox/small.ico" -Force
          Write-Host "ICO converted to legacy format"

      - name: Build MinecraftConsoles
        run: |
          msbuild Clone/MinecraftConsoles.sln `
            /p:Configuration=${{ inputs.configuration }} `
            /p:Platform=${{ inputs.platform }} `
            /m

      - name: Zip build output
        if: inputs.configuration == 'Release'
        run: 7z a -r LCEWindows64.zip ./Clone/x64/Release/*

      - name: Upload artifact for release job
        if: inputs.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            LCEWindows64.zip
            Clone/x64/Release/Minecraft.Client.exe
            Clone/x64/Release/Minecraft.Client.pdb

      - name: Upload artifact (Debug)
        if: inputs.configuration == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-debug
          path: Clone/x64/Debug/

  # ─── JOB 3: Release ─────────────────────────────────────────────
  release:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs: build
    if: inputs.configuration == 'Release'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release
          prerelease: true
          body: |
            Requires at least Windows 7 and DirectX 11 compatible GPU to run.
            Compiled with MSVC v14.44.35207 in Release mode with `/O2 /Ot /Oi /Ob3 /GF /fp:precise`.
          files: |
            artifacts/LCEWindows64.zip
            artifacts/Minecraft.Client.exe
            artifacts/Minecraft.Client.pdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Clone, Build and Release

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: 'Target platform'
        required: true
        default: 'Windows64'
        type: string

jobs:
  # ─── JOB 1: Clone ───────────────────────────────────────────────
  clone:
    name: Clone MinecraftConsoles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete Clone/ and commit
        run: |
          git rm -rf Clone/ --ignore-unmatch
          git diff --cached --quiet || git commit -m "chore: clear Clone/ [skip ci]"
          git push

      - name: Clone MinecraftConsoles into Clone/
        run: |
          git clone https://github.com/smartcmd/MinecraftConsoles.git Clone/
          rm -rf Clone/.git

      - name: Commit and push cloned content
        run: |
          cp MinecraftWindows.ico Clone/Minecraft.Client/Xbox/MinecraftWindows.ico
          cp MinecraftWindows.ico Clone/Minecraft.Client/Xbox/small.ico
          git add Clone/
          git diff --cached --quiet || git commit -m "chore: sync MinecraftConsoles clone [skip ci]"
          git push

  # ─── JOB 2: Build ───────────────────────────────────────────────
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.configuration }})
    runs-on: windows-2022
    needs: clone

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Pillow
        run: pip install pillow

      - name: Convert ICO to legacy DIB format
        run: |
          python -c "
import struct, sys

# Read the source ICO from repo root
with open('MinecraftWindows.ico', 'rb') as f:
    data = f.read()

print(f'Source ICO size: {len(data)} bytes')
print(f'Magic bytes: {data[:4].hex()}')

# Try to find PNG signature inside the ICO (PNG-compressed ICO)
# If found, extract PNGs and rebuild as DIB ICO
# Otherwise just copy as-is and let it fail with more info

# Parse ICO header
reserved, ico_type, count = struct.unpack_from('<HHH', data, 0)
print(f'Type: {ico_type}, Images: {count}')

entries = []
for i in range(count):
    offset = 6 + i * 16
    w, h, cc, res, planes, bpp, size, img_offset = struct.unpack_from('<BBBBHHII', data, offset)
    img_data = data[img_offset:img_offset+size]
    print(f'  Image {i}: {w}x{h} bpp={bpp} size={size} magic={img_data[:4].hex()}')
    entries.append((w, h, planes, bpp, img_data))

# Rebuild as BMP-only ICO (no PNG compression)
from PIL import Image
import io

out_entries = []
for w, h, planes, bpp, img_data in entries:
    if img_data[:4] == b'\x89PNG':
        # PNG compressed - convert to BMP DIB
        img = Image.open(io.BytesIO(img_data)).convert('RGBA')
    else:
        # Already BMP DIB - use as-is
        out_entries.append((w or 256, h or 256, planes, bpp, img_data))
        continue
    
    aw = img.width
    ah = img.height
    pixels = img.tobytes('raw', 'BGRA')
    and_mask = bytes(((aw + 31) // 32) * 4 * ah)
    dib = struct.pack('<IiiHHIIiiII', 40, aw, ah*2, 1, 32, 0, len(pixels)+len(and_mask), 0,0,0,0)
    out_entries.append((aw, ah, 1, 32, dib + pixels + and_mask))

# Write new ICO
n = len(out_entries)
hdr = struct.pack('<HHH', 0, 1, n)
dir_size = n * 16
img_offset = 6 + dir_size
dirs = b''
imgs = b''
for w, h, planes, bpp, img_data in out_entries:
    dirs += struct.pack('<BBBBHHII', min(w,255), min(h,255), 0, 0, planes, bpp, len(img_data), img_offset)
    img_offset += len(img_data)
    imgs += img_data

result = hdr + dirs + imgs
for path in ['Clone/Minecraft.Client/Xbox/MinecraftWindows.ico', 'Clone/Minecraft.Client/Xbox/small.ico']:
    with open(path, 'wb') as f:
        f.write(result)
    print(f'Written: {path}')
"

      - name: Build MinecraftConsoles
        run: |
          msbuild Clone/MinecraftConsoles.sln `
            /p:Configuration=${{ inputs.configuration }} `
            /p:Platform=${{ inputs.platform }} `
            /m

      - name: Zip build output
        if: inputs.configuration == 'Release'
        run: 7z a -r LCEWindows64.zip ./Clone/x64/Release/*

      - name: Upload artifact for release job
        if: inputs.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            LCEWindows64.zip
            Clone/x64/Release/Minecraft.Client.exe
            Clone/x64/Release/Minecraft.Client.pdb

      - name: Upload artifact (Debug)
        if: inputs.configuration == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-debug
          path: Clone/x64/Debug/

  # ─── JOB 3: Release ─────────────────────────────────────────────
  release:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs: build
    if: inputs.configuration == 'Release'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release
          prerelease: true
          body: |
            Requires at least Windows 7 and DirectX 11 compatible GPU to run.
            Compiled with MSVC v14.44.35207 in Release mode with `/O2 /Ot /Oi /Ob3 /GF /fp:precise`.
          files: |
            artifacts/LCEWindows64.zip
            artifacts/Minecraft.Client.exe
            artifacts/Minecraft.Client.pdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}